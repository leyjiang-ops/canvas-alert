name: 检测新作业 + 定时提醒（每 5 分钟）

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: canvas-state
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Stream check (detect new assignments)
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --stream

      - name: Fire scheduled reminders
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --check

      - name: Generate ICS calendars
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --ics

      - name: Save state (retry on concurrent push)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 快照本次 run 产出的状态文件，便于冲突时重新 apply
          SNAP=$(mktemp -d)
          mkdir -p "$SNAP/docs"
          cp deadlines_*.json     "$SNAP/"      2>/dev/null || true
          cp docs/calendar_*.ics  "$SNAP/docs/" 2>/dev/null || true

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            # 把快照 apply 到最新 origin 之上
            cp "$SNAP"/deadlines_*.json     .         2>/dev/null || true
            cp "$SNAP/docs"/calendar_*.ics  docs/     2>/dev/null || true

            git add deadlines_*.json docs/*.ics
            if git diff --cached --quiet; then
              echo "No state changes to commit"
              exit 0
            fi

            git commit -m "chore: update state [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, sleeping then retrying..."
            sleep $((attempt * 3))
          done

          echo "::warning::Could not push state after 5 attempts; next run will catch up"
          exit 0

name: 检测新作业 + 定时提醒（每 5 分钟）

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: canvas-state
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Stream check (detect new assignments)
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --stream

      - name: Fire scheduled reminders
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --check

      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deadlines_*.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push

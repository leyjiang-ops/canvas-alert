name: 每日作业汇总（10:00 CST）

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run daily summary
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --daily

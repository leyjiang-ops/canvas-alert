name: 每日作业汇总（10:00 CST）

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: canvas-state
  cancel-in-progress: false

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run daily summary
        env:
          USERS_CONFIG: ${{ secrets.USERS_CONFIG }}
        run: python canvas_alert.py --daily

      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deadlines_*.json docs/*.ics
          git diff --cached --quiet || git commit -m "chore: daily sync [skip ci]"
          git pull --rebase origin main
          git push

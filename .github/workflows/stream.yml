name: 检测新作业（每 5 分钟）

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: canvas-state
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Check activity stream for new assignments
        env:
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python canvas_alert.py --stream

      - name: Save state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deadlines.json
          git diff --cached --quiet || git commit -m "chore: stream update [skip ci]"
          git push
